name: API Load Test

on:
  pull_request:
    branches:
      - main

jobs:
  performance-check:
    runs-on: ubuntu-latest
    #test
    defaults:
      run:
        working-directory: ./umh_api 
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './umh_api/package-lock.json'
      
      - name: Install dependencies
        run: npm ci

      - name: Start Express Server in Background
        env: 
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
        run: |
          npm run start &
          npx wait-on http://localhost:5000/api/health

      - name: Install k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6

      - name: Run k6 Load Test
        run: k6 run test/load-test.js