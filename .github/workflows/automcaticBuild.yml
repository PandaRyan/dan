name: automatic build

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./umh_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './umh_app/package-lock.json'

      - name: Install dependencies
        run: npm ci
      
      - name: Build Project (automatic build)
        run: npm run build

       
    




